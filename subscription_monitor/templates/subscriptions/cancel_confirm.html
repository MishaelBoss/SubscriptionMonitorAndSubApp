{% extends 'base.html' %}

{% block title %}Отмена подписки{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-warning">
            <div class="card-header bg-warning">
                <h5>Подтверждение отмены</h5>
            </div>
            <div class="card-body">
                <p>Вы уверены, что хотите отменить подписку?</p>
                <p><strong>{{ subscription.service.name }}</strong> - {{ subscription.amount }} {{ subscription.currency }}</p>
                
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-warning">
                        Да, отменить
                    </button>
                    <a href="{% url 'subscriptions:detail' subscription.pk %}" class="btn btn-secondary">
                        Нет, вернуться
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
