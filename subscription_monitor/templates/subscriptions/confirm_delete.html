{% extends 'base.html' %}

{% block title %}Удаление подписки{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h5>Подтверждение удаления</h5>
            </div>
            <div class="card-body">
                <p>Вы уверены, что хотите удалить подписку?</p>
                <p><strong>{{ subscription.service.name }}</strong> - {{ subscription.amount }} {{ subscription.currency }}</p>
                
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        Да, удалить
                    </button>
                    <a href="{% url 'subscriptions:detail' subscription.pk %}" class="btn btn-secondary">
                        Отмена
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
